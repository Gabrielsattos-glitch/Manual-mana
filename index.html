        document.addEventListener('DOMContentLoaded', () => {
            showCategories();
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (term) searchRecipes(term);
                else showCategories();
            });
        });

        function showCategories() {
            document.getElementById('categoriesView').classList.remove('hidden');
            document.getElementById('recipesView').classList.add('hidden');
            document.getElementById('recipeDetailView').classList.add('hidden');
            renderCategories();
        }

        function renderCategories() {
            const categories = {};
            recipes.forEach(r => {
                if (!categories[r.category]) categories[r.category] = [];
                categories[r.category].push(r);
            });

            let html = '<div class="categories-grid">';
            for (const [cat, items] of Object.entries(categories)) {
                html += `
                    <div class="category-card" onclick="selectCategory('${cat}')">
                        <div class="category-emoji">${categoryEmojis[cat] || '📁'}</div>
                        <div class="category-name">${cat}</div>
                        <div class="category-count">${items.length} itens</div>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('categoriesView').innerHTML = html;
        }

        function selectCategory(category) {
            currentCategory = category;
            const filtered = recipes.filter(r => r.category === category);
            
            document.getElementById('categoriesView').classList.add('hidden');
            document.getElementById('recipesView').classList.remove('hidden');
            document.getElementById('recipeDetailView').classList.add('hidden');
            
            document.getElementById('categoryHeader').innerHTML = `
                <div class="category-title">
                    <span class="category-title-emoji">${categoryEmojis[category] || '📁'}</span>
                    <span class="category-title-text">${category}</span>
                </div>
            `;
            
            let listHtml = '';
            filtered.forEach(r => {
                listHtml += `
                    <div class="recipe-item" onclick="selectRecipe('${r.name.replace(/'/g, "\\'")}')">
                        <div class="recipe-item-header">
                            <span class="recipe-item-name">${r.emoji} ${r.name}</span>
                            <span class="recipe-item-icon">→</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('recipesList').innerHTML = listHtml;
        }

        function selectRecipe(recipeName) {
            currentRecipe = recipes.find(r => r.name === recipeName);
            if (!currentRecipe) return;
            
            document.getElementById('categoriesView').classList.add('hidden');
            document.getElementById('recipesView').classList.add('hidden');
            document.getElementById('recipeDetailView').classList.remove('hidden');
            
            let details = `
                <div class="recipe-card">
                    <div class="recipe-header">
                        <span class="recipe-header-emoji">${currentRecipe.emoji}</span>
                        <span class="recipe-header-title">${currentRecipe.name}</span>
                    </div>
                    
                    <div class="recipe-section">
                        <div class="recipe-section-title">📝 Ingredientes</div>
                        <ul class="ingredients-list">
                            ${currentRecipe.ingredients.map(i => `<li>• ${i}</li>`).join('')}
                        </ul>
                    </div>
            `;
            
            if (currentRecipe.validity) {
                details += `
                    <div class="recipe-section">
                        <div class="recipe-section-title">⏰ Validade</div>
                        <div class="preparation-text">${currentRecipe.validity.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            }
            
            if (currentRecipe.yield) {
                details += `
                    <div class="recipe-section">
                        <div class="recipe-section-title">⚖️ Rendimento</div>
                        <div class="preparation-text">${currentRecipe.yield}</div>
                    </div>
                `;
            }
            
            if (currentRecipe.storage) {
                details += `
                    <div class="recipe-section">
                        <div class="recipe-section-title">🌡️ Armazenamento</div>
                        <div class="preparation-text">${currentRecipe.storage}</div>
                    </div>
                `;
            }
            
            details += `
                <div class="recipe-section">
                    <div class="recipe-section-title">👩‍🍳 Modo de preparo</div>
                    <div class="preparation-text">${currentRecipe.prep.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            
            if (currentRecipe.epi) {
                details += `
                    <div class="recipe-section">
                        <div class="recipe-section-title">🧤 EPIs recomendados</div>
                        <div class="preparation-text">${currentRecipe.epi}</div>
                    </div>
                `;
            }
            
            if (currentRecipe.obs) {
                details += `<div class="observation">📌 ${currentRecipe.obs}</div>`;
            }
            
            // Só mostra botão de calcular se o item tiver hasCalculator = true
            if (currentRecipe.hasCalculator) {
                details += `
                    <button class="calc-button" onclick="openCalculator('${currentRecipe.name.replace(/'/g, "\\'")}')">
                        🧮 Calcular proporção
                    </button>
                `;
            }
            
            details += `</div>`;
            document.getElementById('recipeDetail').innerHTML = details;
        }

        function showRecipes() {
            if (currentCategory) selectCategory(currentCategory);
            else showCategories();
        }

        function searchRecipes(term) {
            const results = recipes.filter(r => 
                r.name.toLowerCase().includes(term) ||
                (r.ingredients && r.ingredients.some(i => i.toLowerCase().includes(term)))
            );
            
            if (results.length === 0) {
                document.getElementById('categoriesView').innerHTML = '<div class="no-results">🔍 Nenhum item encontrado</div>';
                document.getElementById('categoriesView').classList.remove('hidden');
                document.getElementById('recipesView').classList.add('hidden');
                document.getElementById('recipeDetailView').classList.add('hidden');
                return;
            }
            
            document.getElementById('categoriesView').classList.add('hidden');
            document.getElementById('recipesView').classList.remove('hidden');
            document.getElementById('recipeDetailView').classList.add('hidden');
            
            document.getElementById('categoryHeader').innerHTML = `
                <div class="category-title">
                    <span class="category-title-emoji">🔍</span>
                    <span class="category-title-text">Resultados</span>
                </div>
            `;
            
            let listHtml = '';
            results.forEach(r => {
                listHtml += `
                    <div class="recipe-item" onclick="selectRecipe('${r.name.replace(/'/g, "\\'")}')">
                        <div class="recipe-item-header">
                            <span class="recipe-item-name">${r.emoji} ${r.name}</span>
                            <span class="recipe-item-icon">→</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('recipesList').innerHTML = listHtml;
        }

        // Calculadora
        function openCalculator(recipeName) {
            currentRecipe = recipes.find(r => r.name === recipeName);
            document.getElementById('modalRecipeName').textContent = recipeName;
            document.getElementById('multiplierInput').value = '1';
            document.getElementById('modalResult').innerHTML = '';
            document.getElementById('printSection').style.display = 'none';
            document.getElementById('calcModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('calcModal').classList.remove('active');
        }

        function calculateProportion() {
            if (!currentRecipe) return;
            
            const input = document.getElementById('multiplierInput').value.trim();
            let multiplier;
            
            try {
                const exp = input.replace(',', '.');
                if (exp.includes('/')) {
                    const parts = exp.split('/');
                    multiplier = parseFloat(parts[0]) / parseFloat(parts[1]);
                } else {
                    multiplier = parseFloat(exp);
                }
                if (isNaN(multiplier) || multiplier <= 0) throw new Error();
            } catch {
                document.getElementById('modalResult').innerHTML = '<div style="color:#E63946; padding:20px; text-align:center;">⚠️ Valor inválido</div>';
                document.getElementById('printSection').style.display = 'none';
                return;
            }

            lastMultiplier = multiplier;

            let result = '<div style="margin-top:20px;"><strong>📝 Ingredientes (proporção):</strong></div><ul style="list-style:none; padding:0;">';
            currentRecipe.ingredients.forEach(ing => {
                const match = ing.match(/^([\d.,]+)\s*(.+)$/);
                if (match) {
                    const val = parseFloat(match[1].replace(',', '.'));
                    const unit = match[2];
                    const novo = val * multiplier;
                    const formatted = Number.isInteger(novo) ? novo : novo.toFixed(2).replace(/\.?0+$/, '');
                    result += `<li style="padding:8px 0; border-bottom:1px solid #F0F0F0;">• ${formatted} ${unit}</li>`;
                } else {
                    result += `<li style="padding:8px 0;">• ${ing}</li>`;
                }
            });
            result += '</ul>';
            
            // Adiciona informação do multiplicador
            result += `<p style="text-align:right; color:#718096; font-size:0.9em;">Fator: ${multiplier}x</p>`;
            
            document.getElementById('modalResult').innerHTML = result;
            document.getElementById('printSection').style.display = 'block';
        }

        // Função de impressão otimizada para térmica
        function printThermal() {
            if (!currentRecipe) return;
            
            // Formatar os ingredientes com o último multiplicador
            let ingredientsHtml = '';
            currentRecipe.ingredients.forEach(ing => {
                const match = ing.match(/^([\d.,]+)\s*(.+)$/);
                if (match) {
                    const val = parseFloat(match[1].replace(',', '.'));
                    const unit = match[2];
                    const novo = val * lastMultiplier;
                    const formatted = Number.isInteger(novo) ? novo : novo.toFixed(2).replace(/\.?0+$/, '');
                    ingredientsHtml += `${formatted} ${unit}\n`;
                } else {
                    ingredientsHtml += `${ing}\n`;
                }
            });

            // Criar conteúdo para impressão térmica (fonte monoespaçada, compacta)
            const printContent = `
                ${currentRecipe.name.toUpperCase()}
                ${'='.repeat(currentRecipe.name.length + 2)}
                
                INGREDIENTES (${lastMultiplier}x):
                ${ingredientsHtml}
                
                MODO DE PREPARO:
                ${currentRecipe.prep.replace(/\n/g, ' ')}
                
                ${currentRecipe.validity ? 'VAL: ' + currentRecipe.validity.replace(/\n/g, ' ') : ''}
                ${currentRecipe.epi ? 'EPI: ' + currentRecipe.epi : ''}
                
                --- MANA ---
            `;

            // Abrir janela de impressão
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>${currentRecipe.name}</title>
                    <style>
                        body {
                            font-family: 'Courier New', monospace;
                            font-size: 12px;
                            white-space: pre-wrap;
                            width: 80mm; /* largura típica de térmica */
                            margin: 0 auto;
                            padding: 10px;
                        }
                        @media print {
                            body { margin: 0; }
                        }
                    </style>
                </head>
                <body>
                    ${printContent.replace(/\n/g, '<br>')}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        window.onclick = (e) => {
            if (e.target === document.getElementById('calcModal')) closeModal();
        };
    </script>
</body>
</html>
